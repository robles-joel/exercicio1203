<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<title>Equilíbrio na Dedicação</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

height:100vh;

background-image:
linear-gradient(rgba(0,0,0,0.55), rgba(0,0,0,0.55)),
url("imagem4.jpg");

background-size:cover;
background-position:center;
background-attachment:fixed;

display:flex;
justify-content:center;
align-items:center;

font-family:'Poppins', sans-serif;
color:white;

}

/* container */

.container{

text-align:center;
max-width:2000px;
padding:40px;

}

/* título */

h1{

font-size:55px;
font-weight:700;
margin-bottom:20px;
letter-spacing:2px;

}

/* texto com efeito máquina de escrever */

.typing{

font-size:22px;
border-right:3px solid white;
white-space:nowrap;
overflow:hidden;

width:0;
animation:typing 4s steps(60,end) forwards, blink .8s infinite;

margin:auto;

}

/* botão */

.btn{

display:inline-block;
margin-top:40px;

padding:15px 35px;

font-size:16px;
font-weight:500;

color:white;

border:2px solid white;

text-decoration:none;

border-radius:30px;

transition:all .4s;

}

.btn:hover{

background:white;
color:black;
transform:scale(1.05);

}

/* animações */

@keyframes typing{

from{width:0}
to{width:100%}

}

@keyframes blink{

50%{border-color:transparent}

}

</style>

</head>

<body>

<div class="container">

<h1>Equilíbrio na Dedicação</h1>

<p class="typing">
Entre o silêncio e o horizonte, a verdadeira dedicação encontra seu equilíbrio... 
</p>


<a href="#" class="btn">Saiba Mais</a>

</div>

</body>

</html>
