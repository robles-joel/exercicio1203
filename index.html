<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<title>Equilíbrio na Dedicação</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
height:100vh;
background-image:url("imagem1.jpg");
background-size:cover;
background-position:center;
display:flex;
justify-content:center;
align-items:center;
font-family:'Poppins', sans-serif;
}

/* caixa principal */

.container{

text-align:center;
padding:50px 70px;

background:rgba(255,255,255,0.15);
backdrop-filter:blur(10px);

border-radius:15px;

color:rgb(0, 0, 0);

box-shadow:0 10px 40px rgba(0,0,0,0.4);

animation:fadeIn 2s ease;

}

/* título */

h1{

font-size:48px;
font-weight:600;
margin-bottom:20px;
letter-spacing:2px;

}

/* texto */

p{

font-size:20px;
font-weight:300;
line-height:1.6;

}

/* animação */

@keyframes fadeIn{

from{
opacity:0;
transform:translateY(30px);
}

to{
opacity:1;
transform:translateY(0);
}

}

</style>

</head>

<body>

<div class="container">

<h1>Equilíbrio na Dedicação</h1>

<p>
Entre o silêncio e o horizonte, a verdadeira dedicação encontra seu equilíbrio
</p>

</div>

</body>

</html>
